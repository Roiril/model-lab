<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>海底探検 — コンポーネント・ギャラリー</title>
<style>
  :root{ --bg:#f3f1ec; --ink:#1c1a17; --accent:#c0573a; --panel:#e9e5dc; --line:#d6d0c4; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Segoe UI",system-ui,sans-serif; }
  #app{ display:flex; height:100%; }
  #side{ width:240px; flex:0 0 240px; background:var(--panel); border-right:1px solid var(--line);
    overflow-y:auto; padding:14px 0; }
  #side h1{ font-size:15px; margin:0 16px 4px; letter-spacing:.04em; }
  #side .sub{ font-size:11px; color:#6b6557; margin:0 16px 12px; }
  .group{ font-size:11px; color:#7a7363;
    margin:14px 16px 4px; letter-spacing:.08em; }
  button.item{ display:block; width:100%; text-align:left; border:0; background:none;
    padding:7px 16px; font-size:13px; color:var(--ink); cursor:pointer; }
  button.item:hover{ background:#ded8cc; }
  button.item.active{ background:var(--accent); color:#fff; }
  #stage{ flex:1; position:relative; }
  #cv{ display:block; width:100%; height:100%; }
  #label{ position:absolute; left:18px; bottom:16px; font-size:13px; color:#6b6557;
    background:rgba(243,241,236,.8); padding:6px 12px; border:1px solid var(--line); }
  #hint{ position:absolute; right:18px; top:14px; font-size:11px; color:#8a8273; }
</style>
</head>
<body>
<div id="app">
  <aside id="side">
    <h1>海底探検</h1>
    <p class="sub">Deep Sea Adventure — 全コンポーネント</p>
    <div id="list"></div>
  </aside>
  <main id="stage">
    <canvas id="cv"></canvas>
    <div id="label">読み込み中…</div>
    <div id="hint">ドラッグ=回転 / ホイール=ズーム / 右ドラッグ=移動</div>
  </main>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { RoomEnvironment } from "three/addons/environments/RoomEnvironment.js";

const ITEMS = [
  { g:"俯瞰", items:[ ["deep-sea-adventure","全部入り（俯瞰）", true] ] },
  { g:"宝物 L1 三角 (0-3)", items:[["tri_0","三角 0"],["tri_1","三角 1"],["tri_2","三角 2"],["tri_3","三角 3"]] },
  { g:"宝物 L2 四角 (4-7)", items:[["sq_4","四角 4"],["sq_5","四角 5"],["sq_6","四角 6"],["sq_7","四角 7"]] },
  { g:"宝物 L3 五角 (8-11)", items:[["pen_8","五角 8"],["pen_9","五角 9"],["pen_10","五角 10"],["pen_11","五角 11"]] },
  { g:"宝物 L4 六角 (12-15)", items:[["hex_12","六角 12"],["hex_13","六角 13"],["hex_14","六角 14"],["hex_15","六角 15"]] },
  { g:"裏トークン（レベル指標）", items:[["back_circle","円 +"],["back_tri","三角 1"],["back_square","四角 2"],["back_pentagon","五角 3"],["back_hexagon","六角 4"]] },
  { g:"その他", items:[["air_marker","空気マーカー"],["submarine_board","潜水艦ボード"],["meeple_purple","潜水士 紫"],["meeple_red","潜水士 赤"],["die","サイコロ"]] },
];

const cv = document.getElementById("cv");
const labelEl = document.getElementById("label");
const renderer = new THREE.WebGLRenderer({ canvas:cv, antialias:true, preserveDrawingBuffer:true });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf3f1ec);
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

const camera = new THREE.PerspectiveCamera(40, 1, 0.001, 100);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// ライト（環境光の上に方向光で陰影）
const key = new THREE.DirectionalLight(0xffffff, 1.7); key.position.set(0.3,0.6,0.5); scene.add(key);
const fill = new THREE.DirectionalLight(0xffffff, 0.5); fill.position.set(-0.4,0.2,-0.3); scene.add(fill);
scene.add(new THREE.AmbientLight(0xffffff, 0.25));

const loader = new GLTFLoader();
let current = null;

function frame(obj){
  const box = new THREE.Box3().setFromObject(obj);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  controls.target.copy(center);
  // 縦横どちらもフレーム内に収まる距離（ビュー縦横比を考慮）
  const vfov = camera.fov*Math.PI/180;
  const aspect = camera.aspect || 1;
  const fitH = (size.y*0.5) / Math.tan(vfov/2);
  const fitW = (size.x*0.5) / (Math.tan(vfov/2)*aspect);
  const d = (Math.max(fitH, fitW) + size.z*0.5) * 1.12;
  // Three.js は Y-up。真上に近い俯瞰（Y を高く、Z へわずかに傾ける）
  camera.position.set(center.x + d*0.02, center.y + d*0.96, center.z + d*0.28);
  const r = Math.max(size.x,size.y,size.z)*0.5 || 0.05;
  camera.near = r*0.02; camera.far = r*80; camera.updateProjectionMatrix();
  controls.update();
}

const BUST = Date.now();   // リロード毎に変わる → GLB のブラウザキャッシュを回避
function load(name, niceLabel){
  labelEl.textContent = "読み込み中… " + niceLabel;
  const sub = name==='deep-sea-adventure' ? 'deep-sea-adventure' : 'glb/'+name;
  loader.load(`/exports/deep-sea/${sub}.glb?v=${BUST}`,
    (gltf)=>{
      if(current) scene.remove(current);
      current = gltf.scene;
      current.traverse(o=>{ if(o.isMesh){ o.material.side = THREE.DoubleSide; } });
      scene.add(current);
      frame(current);
      labelEl.textContent = niceLabel;
    },
    undefined,
    (err)=>{ labelEl.textContent = "読み込み失敗: "+name; console.error(err); }
  );
}

// サイドバー生成
const listEl = document.getElementById("list");
let firstBtn = null;
for(const grp of ITEMS){
  const h = document.createElement("div"); h.className="group"; h.textContent=grp.g; listEl.appendChild(h);
  for(const [name,nice] of grp.items){
    const b = document.createElement("button"); b.className="item"; b.textContent=nice;
    b.onclick = ()=>{ document.querySelectorAll(".item").forEach(x=>x.classList.remove("active"));
      b.classList.add("active"); load(name,nice); };
    listEl.appendChild(b);
    if(!firstBtn) firstBtn = b;
  }
}

function resize(){
  const w = cv.clientWidth, h = cv.clientHeight;
  if(cv.width!==w*devicePixelRatio || cv.height!==h*devicePixelRatio){
    renderer.setSize(w,h,false);
    camera.aspect = w/h; camera.updateProjectionMatrix();
  }
}
function tick(){ resize(); controls.update(); renderer.render(scene,camera); requestAnimationFrame(tick); }
tick();

firstBtn.classList.add("active");
load("deep-sea-adventure","全部入り（俯瞰）");
</script>
</body>
</html>
