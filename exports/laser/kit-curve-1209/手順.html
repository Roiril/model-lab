<h1>curve-bot（まるい子）— レーザーカット手順</h1>
<p class=note>リビングヒンジで胴体を巻く円筒ロボット。<b>素材は2.5〜3mmのMDF/シナ合板</b>（アクリルはヒンジで割れる）。<br>
パーツ＝帯1枚（ヒンジ＋顔）＋D字フタ2枚。<b>ヒンジのスリットも赤=カット</b>で処理。</p>
