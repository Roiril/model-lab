<h1>facet-bot（多面体のまるい子）— レーザーカット手順</h1>
<p class=note>曲げない“丸い胴体”版。背面を平らなファセットに割ってあるので<b>アクリルで割れない</b>。<br>
部品＝平パネル9枚（前面＝顔1＋背面8）＋D字フタ2枚。<b>素材3mmアクリル・濃色推奨</b>。</p>
